name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop] # Remove 'main' here so it doesn't double-run
  # Allow the deploy workflow to call this as a reusable CI gate
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Typecheck, Lint, Test, Build
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: secondbrain
          POSTGRES_PASSWORD: secondbrain
          POSTGRES_DB: secondbrain_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Turbo local cache: key is OS + lockfile hash so cache hits survive
      # across commits on the same dependency tree. SHA-based keys always miss.
      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            turbo-${{ runner.os }}-

      # Run typecheck + lint together so Turbo can parallelise them.
      # Both depend on ^build via turbo.json, so shared upstream builds are
      # deduped inside a single turbo invocation.
      - name: Typecheck & Lint
        run: pnpm turbo typecheck lint

      - name: Test
        run: pnpm turbo test
        env:
          NODE_ENV: test
          REDIS_URL: redis://localhost:6379
          DATABASE_URL: postgresql://secondbrain:secondbrain@localhost:5432/secondbrain_test
          JWT_SECRET: test-secret-not-for-production
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_TEST }}

      # Build after test: Turbo will cache-hit all packages already built
      # as transitive deps of typecheck/test, so only app bundles are rebuilt.
      - name: Build
        run: pnpm turbo build

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: ci

    strategy:
      # Build all three images in parallel; fail-fast so a broken Dockerfile
      # doesn't waste time waiting for the other two to finish.
      fail-fast: true
      matrix:
        include:
          - name: http-backend
            file: apps/http-backend/Dockerfile
          - name: ws-backend
            file: apps/ws-backend/Dockerfile
          - name: web
            file: apps/web/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.name }} image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.file }}
          push: false
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max
