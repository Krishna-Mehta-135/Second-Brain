name: Deploy

# Push to main triggers a build+push to GHCR.
# Images are tagged with both `latest` and the commit SHA for immutable rollbacks.
on:
  push:
    branches: [main]

# One deploy at a time; cancel any in-flight run when a new commit lands.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Gate: CI must pass before we ship anything ──────────────────────────────
  ci-check:
    name: Verify CI green
    uses: ./.github/workflows/ci.yml

  # ── Build & push all images in parallel ─────────────────────────────────────
  build-and-push:
    name: Build & push ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: ci-check

    permissions:
      contents: read
      packages: write   # required to push to GHCR

    strategy:
      fail-fast: false  # keep building other images if one fails
      matrix:
        include:
          - service: http-backend
            dockerfile: apps/http-backend/Dockerfile
          - service: ws-backend
            dockerfile: apps/ws-backend/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Docker image names must be lowercase
      - name: Derive lowercase image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}/${{ matrix.service }}" >> "${GITHUB_ENV}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract Docker metadata (tags + labels) from Git context
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      # For the web service, NEXT_PUBLIC_* vars must be baked in at build time.
      # Safari requires wss:// (SSL) so we always use the production domain here.
      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: runner
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Scope the GHA layer cache per service so they don't overwrite each other
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max
          provenance: false   # keeps manifest lists simple for standard registries

  # ── Deploy to both GCP VMs in parallel ──────────────────────────────────────
  deploy:
    name: Deploy to ${{ matrix.vm_ip }}
    runs-on: ubuntu-latest
    needs: build-and-push

    strategy:
      fail-fast: false  # continue deploying to the second VM even if the first fails
      matrix:
        # Simplified and clean
        vm_ip: [ "${{ vars.VM_1_IP }}", "${{ vars.VM_2_IP }}" ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure directory exists on VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ matrix.vm_ip }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -euo pipefail
            sudo mkdir -p /opt/knowdex
            sudo chown $USER:$USER /opt/knowdex

      - name: Copy docker-compose to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ matrix.vm_ip }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "/opt/knowdex/"

      - name: SSH deploy to VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ matrix.vm_ip }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/knowdex

            # Force the repo name to lowercase for the pull
            LOWER_REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')

            # Write runtime env from GitHub Secrets so no secrets live in the image
            cat > .env <<EOF
            NODE_ENV=production
            # Use the lowercase version here!
            GITHUB_REPO=$LOWER_REPO
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            REDIS_HOST=10.190.0.4
            REDIS_PORT=6379
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            FRONTEND_URL=https://knowdex.me
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            GOOGLE_CALLBACK_URL=https://api.knowdex.me/api/v1/auth/google/callback
            GH_CLIENT_ID=${{ secrets.GH_CLIENT_ID }}
            GH_CLIENT_SECRET=${{ secrets.GH_CLIENT_SECRET }}
            GH_CALLBACK_URL=https://api.knowdex.me/api/v1/auth/github/callback
            EOF

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f