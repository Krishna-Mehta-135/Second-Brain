name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push HTTP Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/http-backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/http-backend:latest
            ghcr.io/${{ github.repository }}/http-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push WS Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/ws-backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/ws-backend:latest
            ghcr.io/${{ github.repository }}/ws-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/web:latest
            ghcr.io/${{ github.repository }}/web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
