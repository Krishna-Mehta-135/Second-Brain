name: Deploy

# Push to main triggers a build+push to GHCR.
# Images are tagged with both `latest` and the commit SHA for immutable rollbacks.
on:
  push:
    branches: [main]

# One deploy at a time; cancel any in-flight run when a new commit lands.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Gate: CI must pass before we ship anything ──────────────────────────────
  ci-check:
    name: Verify CI green
    uses: ./.github/workflows/ci.yml

  # ── Build & push all images in parallel ─────────────────────────────────────
  build-and-push:
    name: Build & push ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: ci-check

    permissions:
      contents: read
      packages: write   # required to push to GHCR

    strategy:
      fail-fast: false  # keep building other images if one fails
      matrix:
        include:
          - service: http-backend
            dockerfile: apps/http-backend/Dockerfile
          - service: ws-backend
            dockerfile: apps/ws-backend/Dockerfile
          - service: web
            dockerfile: apps/web/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Docker image names must be lowercase
      - name: Derive lowercase image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}/${{ matrix.service }}" >> "${GITHUB_ENV}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract Docker metadata (tags + labels) from Git context
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: runner
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Scope the GHA layer cache per service so they don't overwrite each other
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max
          provenance: false   # keeps manifest lists simple for standard registries
