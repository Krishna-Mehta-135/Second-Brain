# docker-compose.yml — local development stack
# ─────────────────────────────────────────────────────────────────────────────
# Environment variables are injected at runtime; NO .env file is baked into
# the images. Create a .env file at the repo root (see .env.example) and
# Docker Compose will pick it up automatically — no env_file directive needed.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: knowdex
      POSTGRES_PASSWORD: knowdex
      POSTGRES_DB: knowdex
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knowdex -d knowdex"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Application services ─────────────────────────────────────────────────────

  http-backend:
    build:
      context: .
      dockerfile: apps/http-backend/Dockerfile
      target: runner
    ports:
      - '${HTTP_PORT:-8000}:${HTTP_PORT:-8000}'
    # All secrets injected at runtime — no .env file in the image
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://knowdex:knowdex@postgres:5432/knowdex
      REDIS_URL: redis://redis:6379
      HTTP_PORT: ${HTTP_PORT:-8000}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-}
      GH_CLIENT_ID: ${GH_CLIENT_ID:-}
      GH_CLIENT_SECRET: ${GH_CLIENT_SECRET:-}
      GH_CALLBACK_URL: ${GH_CALLBACK_URL:-}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  ws-backend:
    build:
      context: .
      dockerfile: apps/ws-backend/Dockerfile
      target: runner
    ports:
      - '8080:8080'
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://knowdex:knowdex@postgres:5432/knowdex
      REDIS_URL: redis://redis:6379
      WS_PORT: 8080
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: runner
      # NEXT_PUBLIC_* vars are baked into the bundle at build time
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8080}
    ports:
      - '3000:3000'
    environment:
      # Server-side only (not baked into client bundle)
      API_BASE_URL: http://http-backend:8000
      NODE_ENV: production
    depends_on:
      http-backend:
        condition: service_healthy
      ws-backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
