version: '3.9'

services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes  # persistence enabled
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: secondbrain
      POSTGRES_PASSWORD: secondbrain
      POSTGRES_DB: secondbrain
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secondbrain"]
      interval: 5s
      timeout: 3s
      retries: 5

  http-backend:
    build:
      context: .
      dockerfile: apps/http-backend/Dockerfile
      target: runner
    ports:
      - '8000:8000'
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://secondbrain:secondbrain@postgres:5432/secondbrain
      REDIS_URL: redis://redis:6379
      HTTP_PORT: 8000
      JWT_SECRET: ${JWT_SECRET:-secret}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  ws-backend:
    build:
      context: .
      dockerfile: apps/ws-backend/Dockerfile
      target: runner
    ports:
      - '8080:8080'
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://secondbrain:secondbrain@postgres:5432/secondbrain
      REDIS_URL: redis://redis:6379
      WS_PORT: 8080
      JWT_SECRET: ${JWT_SECRET:-secret}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: runner
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8080
    depends_on:
      - http-backend
      - ws-backend

volumes:
  redis_data:
  postgres_data:
